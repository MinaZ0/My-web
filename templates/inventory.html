{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2 class="fw-bold mb-4">📦 My Collection ({{ cards|length }} Cards)</h2>
    <div class="row">
        {% for card in cards %}
        <div class="col-md-3 mb-4">
            <div class="card h-100 shadow-sm border-primary border-2">
                <div class="text-center p-3">
                    <img src="{{ card.image_url }}" class="img-fluid" style="height: 180px; object-fit: contain;">
                </div>
                <div class="card-body text-center bg-light">
                    <h6 class="fw-bold mb-1">{{ card.name }}</h6>
                    <span class="badge bg-dark small">{{ card.rarity }}</span>
                    <div class="mt-2">
                        <span class="text-success small">● In My Stock</span>
                    </div>
                </div>
            </div>
        </div>
        {% else %}
        <div class="col-12 text-center py-5">
            <p class="text-muted">ยังไม่มีการ์ดในคลัง... ลองไปช้อปปิ้งดูสิ!</p>
            <a href="/" class="btn btn-primary">ไปหน้าตลาด</a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
