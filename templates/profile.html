{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center mt-5">
        <div class="card shadow-lg p-5 border-0" style="border-radius: 20px;">
            <div class="mb-3">
                <img src="https://ui-avatars.com/api/?name={{ current_user.username }}&background=random&size=128" class="rounded-circle shadow">
            </div>
            <h2 class="fw-bold">{{ current_user.username }}</h2>
            <hr>
            <div class="row mt-4">
                <div class="col-6 border-end">
                    <h5 class="text-muted">ยอดเงินคงเหลือ</h5>
                    <h3 class="text-primary fw-bold">{{ "{:,}".format(current_user.balance) }} THB</h3>
                </div>
                <div class="col-6">
                    <h5 class="text-muted">การ์ดในครอบครอง</h5>
                    <h3 class="text-success fw-bold">{{ cards_count }} ใบ</h3>
                </div>
            </div>
            <div class="mt-4">
                <a href="/" class="btn btn-dark w-100 mb-2">กลับไปช้อปปิ้ง</a>
                <a href="/logout" class="btn btn-outline-danger w-100">ออกจากระบบ</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
