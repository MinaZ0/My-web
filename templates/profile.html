{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0 text-center p-5" style="border-radius: 20px;">
                <img src="https://ui-avatars.com/api/?name={{ current_user.username }}&size=128&background=random" class="rounded-circle mx-auto mb-3 shadow border border-4 border-white">
                <h2 class="fw-bold mb-0">{{ current_user.username }}</h2>
                <p class="text-muted mb-4">TCG Enthusiast</p>
                
                <div class="row bg-light rounded-4 p-3 mb-4 shadow-sm">
                    <div class="col-6 border-end">
                        <h4 class="text-success fw-bold mb-0">{{ "{:,}".format(current_user.balance) }}</h4>
                        <small class="text-muted">ยอดเงิน (บาท)</small>
                    </div>
                    <div class="col-6">
                        <h4 class="text-primary fw-bold mb-0">{{ cards_count }}</h4>
                        <small class="text-muted">การ์ดที่ลงขาย</small>
                    </div>
                </div>
                
                <div class="d-grid gap-2">
                    <a href="/my-cards" class="btn btn-primary fw-bold rounded-pill py-2">จัดการการ์ดของฉัน</a>
                    <a href="/topup" class="btn btn-outline-success rounded-pill py-2">เติมเงิน</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
