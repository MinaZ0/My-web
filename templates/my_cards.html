{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">🗂️ การ์ดที่ฉันลงขาย</h2>
        <a href="/add" class="btn btn-primary">+ ลงขายเพิ่ม</a>
    </div>

    <div class="row row-cols-1 row-cols-md-4 g-4">
        {% for card in cards %}
        <div class="col">
            <div class="card h-100 shadow-sm border-0">
                <img src="{{ card.image_url }}" class="card-img-top p-3" style="height: 200px; object-fit: contain;">
                <div class="card-body text-center">
                    <h6 class="fw-bold mb-1">{{ card.name }}</h6>
                    <p class="text-primary fw-bold">{{ "{:,}".format(card.price) }} THB</p>
                    
                    <div class="d-grid">
                        <a href="/delete/{{ card.id }}" class="btn btn-outline-danger btn-sm" 
                           onclick="return confirm('คุณแน่ใจนะว่าจะลบการ์ดใบนี้?')">ลบรายการนี้</a>
                    </div>
                </div>
            </div>
        </div>
        {% else %}
        <div class="col-12 text-center py-5">
            <p class="text-muted">คุณยังไม่มีการ์ดที่ลงขายในขณะนี้</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
