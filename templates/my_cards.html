{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h3 class="fw-bold mb-4">🗂️ การ์ดที่คุณกำลังลงขาย</h3>
    <div class="row row-cols-1 row-cols-md-4 g-4">
        {% for card in cards %}
        <div class="col">
            <div class="card h-100 shadow-sm border-0">
                <img src="{{ card.image_url }}" class="card-img-top p-3" style="height: 200px; object-fit: contain;">
                <div class="card-body text-center">
                    <h6 class="fw-bold">{{ card.name }}</h6>
                    <p class="text-danger fw-bold">{{ "{:,}".format(card.price) }}฿</p>
                    <a href="/delete/{{ card.id }}" class="btn btn-outline-danger btn-sm w-100" onclick="return confirm('ลบการ์ดใบนี้?')">ลบรายการนี้</a>
                </div>
            </div>
        </div>
        {% else %}
        <div class="col-12 text-center py-5">
            <h5 class="text-muted">คุณยังไม่ได้ลงขายการ์ดใบไหนเลย</h5>
            <a href="/add" class="btn btn-primary mt-3">เริ่มลงขายตอนนี้</a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
