{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-0 p-4">
            <h2 class="fw-bold text-center mb-4">เติมเงินเข้าระบบ</h2>
            <div class="alert alert-info text-center">ยอดเงินปัจจุบัน: <strong>{{ current_user.balance }} THB</strong></div>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">จำนวนเงิน (THB)</label>
                    <input type="number" name="amount" class="form-control form-control-lg" placeholder="0" required>
                </div>
                <button type="submit" class="btn btn-success w-100 btn-lg fw-bold">ยืนยันการเติมเงิน</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
