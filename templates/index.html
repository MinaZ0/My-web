{% extends "base.html" %}
{% block content %}
<h2 class="mb-4 fw-bold">🛒 Card Market</h2>
<div class="row">
    {% for card in cards %}
    <div class="col-md-3 mb-4">
        <div class="card h-100 shadow-sm border-0">
            <div class="text-center p-3">
                <img src="{{ card.image_url }}" class="img-fluid" style="height: 200px; object-fit: contain;">
            </div>
            <div class="card-body text-center">
                <h5 class="fw-bold">{{ card.name }}</h5>
                <p class="text-primary fw-bold">{{ "{:,}".format(card.price) }} THB</p>
                <div class="d-grid gap-2">
                    <a href="/buy/{{ card.id }}" class="btn btn-success btn-sm">Buy Now</a>
                    <a href="/wishlist/add/{{ card.id }}" class="btn btn-outline-danger btn-sm">❤️ Add to Wishlist</a>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
