{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Trading Cards</h2>
    <div class="row">
        {% for card in cards %}
        <div class="col-md-4 col-lg-3 mb-4">
            <div class="card h-100 shadow-sm border-0">
                <img src="{{ card.image_url }}" class="card-img-top p-3" style="max-height: 250px; object-fit: contain;">
                <div class="card-body text-center">
                    <span class="badge bg-secondary mb-2">{{ card.game }}</span>
                    <h5 class="card-title fw-bold">{{ card.name }}</h5>
                    <p class="text-danger small mb-2">{{ card.rarity }}</p>
                    <p class="fs-5 text-primary fw-bold">{{ "{:,}".format(card.price) }} THB</p>
                    <div class="d-grid gap-2">
                        <button class="btn btn-dark btn-sm">Add to Cart</button>
                    <a href="/delete/{{ card.id }}" class="btn btn-outline-danger btn-sm" onclick="return confirm('ลบการ์ดใบนี้?')">Delete</a>
                </div>
            </div>
        </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
