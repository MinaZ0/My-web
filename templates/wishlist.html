{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">❤️ My Wishlist</h2>
<div class="row">
    {% for fav in favorites %}
    <div class="col-md-3 mb-4">
        <div class="card h-100 shadow-sm border-0">
            <img src="{{ fav.card.image_url }}" class="card-img-top p-3" style="height: 180px; object-fit: contain;">
            <div class="card-body text-center">
                <h6>{{ fav.card.name }}</h6>
                <a href="/buy/{{ fav.card.id }}" class="btn btn-success btn-sm w-100">Buy Now</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
