<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guy TCG Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">GUY TCG SHOP</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="/">Store</a>
                    </li>
                </ul>

                <form class="d-flex ms-auto" action="/" method="GET">
                    <input class="form-control me-2" type="search" name="search" placeholder="ค้นหาชื่อการ์ด..." aria-label="Search">
                    <button class="btn btn-outline-warning" type="submit">Search</button>
                </form>
                <div class="navbar-nav ms-3">
                    <a class="nav-link text-warning fw-bold" href="#">Cart (0)</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center mt-5 py-4 border-top bg-white">
        <p class="text-muted">&copy; 2026 Guy TCG Project - PSU AI Engineering Student</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-0 p-4">
            <h2 class="fw-bold text-center mb-4">เติมเงินเข้าระบบ</h2>
            <div class="alert alert-info text-center">ยอดเงินปัจจุบัน: <strong>{{ current_user.balance }} THB</strong></div>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">จำนวนเงิน (THB)</label>
                    <input type="number" name="amount" class="form-control form-control-lg" placeholder="0" required>
                </div>
                <button type="submit" class="btn btn-success w-100 btn-lg fw-bold">ยืนยันการเติมเงิน</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
